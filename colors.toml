# Aurelia Dark — iOS 26 / macOS 26-inspired dark theme
# Deep neutral base with warm orange accent
# Palette: Neutral 900 (#181B25) base + Orange 500 (#F05629) accent

accent = "#F05629"
cursor = "#F05629"
foreground = "#E1E4EA"
background = "#181B25"
selection_foreground = "#181B25"
selection_background = "#F05629"

