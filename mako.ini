include=~/.local/share/omarchy/default/mako/core.ini

# Aurelia Dark — notification colors
text-color=#E1E4EA
border-color=#F05629
background-color=#222530e6

# Size & position
default-timeout=4000
width=360
height=80
padding=12
margin=8
border-size=2
border-radius=14
outer-margin=12
anchor=top-right
layer=overlay

# Font — matches terminal
font=Fira Code 10
max-icon-size=24

# Spotify notifications are noisy — suppress them
[app-name=Spotify]
invisible=1

[mode=do-not-disturb]
invisible=true

[mode=do-not-disturb app-name=notify-send]
invisible=false
