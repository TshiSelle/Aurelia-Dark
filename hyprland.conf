# Aurelia Dark — Hyprland theme overrides
# iOS 26 / macOS 26 aesthetic: fluid motion, orange accent, deep neutrals

# Orange gradient border: vivid → soft → dark → soft → vivid
$activeBorderColor   = rgb(F05629) rgb(F87F6B) rgb(2B303B) rgb(F87F6B) rgb(F05629) 135deg
$inactiveBorderColor = rgb(2B303B) rgb(222530) rgb(181B25) rgb(222530) rgb(2B303B) 135deg

general {
    col.active_border   = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    border_size = 1
    gaps_in     = 6
    gaps_out    = 12
}

group {
    col.border_active   = $activeBorderColor
    col.border_inactive = $inactiveBorderColor

    groupbar {
        height     = 20
        font_size  = 11
        gradients  = true
        col.active   = rgba(F0562988)
        col.inactive = rgba(2B303B66)
        text_color   = rgba(E1E4EAff)
        text_color_inactive = rgba(CACFD880)
    }
}

decoration {
    # iOS-grade corner rounding
    rounding = 14

    dim_inactive = true
    dim_strength = 0.12

    active_opacity   = 1.0
    inactive_opacity = 0.92

    blur {
        enabled           = true
        size              = 8
        passes            = 3
        noise             = 0.04
        contrast          = 0.88
        brightness        = 0.82
        vibrancy          = 0.18
        new_optimizations = true
        xray              = false
    }

    shadow {
        enabled        = true
        range          = 24
        render_power   = 4
        color          = rgba(0E121Bd0)
        color_inactive = rgba(0E121B80)
    }
}

animations {
    enabled = true

    # iOS 26 spring curves — overshoot, settle, feel alive
    bezier = ios,        0.25, 0.46, 0.45, 0.94
    bezier = ios_out,    0.16, 1.00, 0.30, 1.00
    bezier = ios_in,     0.70, 0.00, 0.84, 0.00
    bezier = spring,     0.34, 1.56, 0.64, 1.00

    # Windows
    animation = windows,     1, 4,  spring,  slide
    animation = windowsIn,   1, 4,  ios_out, slide
    animation = windowsOut,  1, 3,  ios_in,  slide
    animation = windowsMove, 1, 4,  spring

    # Fading
    animation = fade,        1, 4,  ios
    animation = fadeIn,      1, 4,  ios_out
    animation = fadeOut,     1, 3,  ios_in

    # Borders — animated gradient rotation
    animation = border,      1, 6,  ios
    animation = borderangle, 1, 80, linear, loop

    # Workspaces — horizontal slide with spring
    animation = workspaces,       1, 5, ios_out, slide
    animation = specialWorkspace, 1, 4, ios_out, slidevert

    # Layers (waybar, walker, mako)
    animation = layers,      1, 4, ios_out, slide
    animation = layersIn,    1, 4, ios_out, fade
    animation = layersOut,   1, 3, ios_in,  fade
}

# Media & streaming — full opacity (opt out of the default-opacity tag system)
windowrule = tag -default-opacity, match:class ^Spotify$
windowrule = opacity 1.0 1.0,     match:class ^Spotify$
windowrule = tag -default-opacity, match:class ^mpv$
windowrule = opacity 1.0 1.0,     match:class ^mpv$
